<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <script>
      (function(){var t=localStorage.getItem('theme')||(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
    </script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小工具</title>
    <link rel="stylesheet" href="../assets/css/home.css">
    <style>
        .tools-shell {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .tools-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .tools-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .tools-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .tools-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .tools-placeholder {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 2.5rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            box-shadow: var(--card-shadow);
        }
    </style>
</head>

<body>
    <div class="tools-shell">
        <header class="tools-header anim-fade-in">
            <div>
                <h1 class="tools-title">小工具</h1>
                <p class="tools-desc">实用小工具合集，后续将陆续添加计算器、单位换算等工具。</p>
            </div>
            <div class="tools-actions">
                <a href="../index.html" class="nav-pill">返回首页</a>
                <button type="button" class="theme-toggle" aria-label="切换主题">🌙</button>
            </div>
        </header>
        <div class="tools-placeholder anim-slide-up stagger-1">
            暂无可用的工具，敬请期待。
        </div>
    </div>

    <script src="../assets/js/theme.js"></script>
</body>

</html>
