<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>离线 - 个人主页</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #f0f2f5 0%, #e2e6eb 100%);
    color: #1d1d1f;
    text-align: center;
    padding: 2rem;
  }
  .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.6; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  p { color: #6e6e73; font-size: 0.95rem; max-width: 320px; line-height: 1.6; }
  a { color: #007aff; text-decoration: none; margin-top: 1.5rem; font-weight: 500; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>当前处于离线状态</h1>
  <p>无法连接到网络。请检查网络连接后重试，或返回已缓存的页面。</p>
  <a href="/">返回首页</a>
</body>
</html>
