<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <script src="../assets/js/theme-init.js"></script>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/note-browser.css">
  <link rel="stylesheet" id="hljs-theme" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>

<body>
  <script>!function () { if (window.matchMedia('(min-width:769px)').matches && localStorage.getItem('note-sidebar-collapsed') === '1') document.body.classList.add('note-sidebar-collapsed'); }();</script>

  <header class="note-toolbar" id="note-toolbar">
    <div class="note-toolbar-left">
      <button type="button" class="glass-btn note-toolbar-toggle" id="note-toolbar-toggle" aria-label="切换目录" aria-expanded="true">≡</button>
      <a href="../index.html" class="glass-nav-link note-toolbar-home"><span class="note-home-icon">←</span><span class="note-home-text"> 首页</span></a>
    </div>
    <nav id="note-breadcrumb" class="note-breadcrumb" aria-label="文件路径"></nav>
    <div class="note-toolbar-right">
      <button type="button" class="large-text-toggle" aria-label="开启大字模式">A+</button>
      <button type="button" class="theme-toggle" aria-label="切换主题">🌙</button>
    </div>
  </header>

  <div class="note-sidebar-overlay" id="note-sidebar-overlay" aria-hidden="true"></div>
  <div class="note-layout">
    <div class="note-sidebar-wrap" id="note-sidebar-wrap">
      <aside class="note-sidebar" id="note-sidebar">
        <button type="button" class="note-sidebar-close" id="note-sidebar-close" aria-label="关闭目录">×</button>
        <div class="note-sidebar-header">
          <span>目录</span>
        </div>
        <div class="note-search-wrap">
          <input type="text" id="note-search" class="note-search-input" placeholder="搜索文件名…" aria-label="搜索笔记">
        </div>
        <div id="note-search-empty" class="note-search-empty" hidden>无匹配结果</div>
        <div id="note-tree"></div>
      </aside>
    </div>
    <main class="note-preview">
      <div id="note-preview-placeholder" class="note-preview-placeholder">
        <div class="note-placeholder-icon">📂</div>
        <div class="note-placeholder-title">选择一篇笔记开始阅读</div>
        <div class="note-placeholder-desc">从左侧目录中点击任意 Markdown 或 HTML 文件</div>
      </div>
      <div id="note-preview-content" class="note-preview-content" style="display:none"></div>
    </main>
  </div>
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/large-text.js"></script>
  <script src="./manifest.js"></script>
  <script src="../assets/js/note-browser.js"></script>
</body>

</html>
